<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>源澄潤設計事務所｜Doris 的八字路口相談室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&subset=chinese-traditional&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
 基礎重置
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
body{
font-family:'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif;
background:#FAF6F1;
color:#4A3728;
min-height:100vh;
}
.hidden{display:none!important;}

/* ══════════════════════════════════════
 容器
══════════════════════════════════════ */
.container{
max-width:860px;
margin:0 auto;
padding:20px 16px 60px;
}

/* ══════════════════════════════════════
 Header
══════════════════════════════════════ */
.site-header{
text-align:center;
padding:28px 20px 20px;
border-bottom:1px solid #E8DDD0;
margin-bottom:24px;
}
.site-header h1{
font-size:1.3rem;
font-weight:700;
color:#8B6914;
letter-spacing:0.05em;
}
.site-header p{
font-size:0.8rem;
color:#B89C7D;
margin-top:4px;
}

/* ══════════════════════════════════════
 卡片
══════════════════════════════════════ */
.card{
background:#fff;
border-radius:16px;
box-shadow:0 2px 12px rgba(74,55,40,0.08);
padding:24px;
margin-bottom:16px;
}

/* ══════════════════════════════════════
 按鈕
══════════════════════════════════════ */
.btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:6px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-family:inherit;
font-size:0.9rem;
font-weight:600;
transition:all 0.2s;
}
.btn-primary{background:#D4B896;color:#4A3728;}
.btn-primary:hover{background:#C4A882;}
.btn-ghost{background:transparent;color:#8B6914;border:1.5px solid #D4B896;}
.btn-ghost:hover{background:#FAF6F1;}
.btn-danger{background:transparent;color:#C0392B;border:1.5px solid #E8A090;font-size:0.75rem;padding:4px 10px;}
.btn-danger:hover{background:#FFEBEE;}
.btn-full{width:100%;padding:14px;font-size:1rem;}

/* ══════════════════════════════════════
 畫面一：客戶列表
══════════════════════════════════════ */
.list-topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.list-topbar h2{font-size:1.1rem;color:#8B6914;}
.client-card{
background:#fff;
border-radius:14px;
box-shadow:0 2px 8px rgba(74,55,40,0.07);
padding:16px 20px;
margin-bottom:12px;
cursor:pointer;
transition:all 0.2s;
display:flex;
justify-content:space-between;
align-items:center;
}
.client-card:hover{box-shadow:0 4px 16px rgba(74,55,40,0.14);transform:translateY(-1px);}
.client-info h3{font-size:1.05rem;font-weight:700;margin-bottom:4px;}
.client-info p{font-size:0.8rem;color:#999;margin:0;}
.empty-state{
text-align:center;
padding:60px 20px;
color:#B89C7D;
}
.empty-state .emoji{font-size:3rem;margin-bottom:12px;}

/* ══════════════════════════════════════
 畫面二：新增客戶
══════════════════════════════════════ */
.page-topbar{
display:flex;
align-items:center;
gap:12px;
margin-bottom:24px;
}
.page-topbar h2{font-size:1.1rem;color:#8B6914;}
.form-group{margin-bottom:18px;}
.form-group label{
display:block;
font-size:0.85rem;
font-weight:600;
color:#8B6914;
margin-bottom:8px;
}
.form-group input,
.form-group select{
width:100%;
padding:11px 14px;
border:1.5px solid #E8DDD0;
border-radius:10px;
font-family:inherit;
font-size:0.95rem;
color:#4A3728;
background:#fff;
outline:none;
transition:border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus{border-color:#D4B896;}
.date-row{display:flex;gap:10px;}
.date-row select{flex:1;}
.time-row{display:flex;gap:10px;align-items:center;}
.time-row select{flex:1;}
.time-sep{font-size:1.2rem;color:#B89C7D;font-weight:700;}

/* 按鈕式單選 */
.toggle-group{display:flex;gap:8px;flex-wrap:wrap;}
.toggle-btn{
padding:9px 20px;
border:1.5px solid #E8DDD0;
border-radius:10px;
background:#fff;
color:#B89C7D;
cursor:pointer;
font-family:inherit;
font-size:0.9rem;
transition:all 0.2s;
}
.toggle-btn.active{
border-color:#D4B896;
background:#FDF5EA;
color:#8B6914;
font-weight:700;
}

/* 農曆對照提示 */
.lunar-hint{
font-size:0.78rem;
color:#B89C7D;
margin-top:6px;
min-height:18px;
}

/* Loading */
.loading-overlay{
position:fixed;inset:0;
background:rgba(250,246,241,0.92);
display:flex;flex-direction:column;
align-items:center;justify-content:center;
z-index:999;
}
.loading-spinner{
width:48px;height:48px;
border:4px solid #E8DDD0;
border-top-color:#D4B896;
border-radius:50%;
animation:spin 0.8s linear infinite;
margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay p{color:#8B6914;font-size:1rem;}

/* ══════════════════════════════════════
 畫面三：報告
══════════════════════════════════════ */
.report-topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:10px;
}

/* 基本訊息表格 */
.info-table{width:100%;border-collapse:collapse;}
.info-table td{
padding:10px 14px;
border:1px solid #F0E8DC;
font-size:0.9rem;
vertical-align:middle;
}
.info-table td.label{
background:#FAF6F1;
color:#8B6914;
font-weight:600;
width:90px;
}
.info-table td.value{background:#fff;}

/* 五行圖 */
.wuxing-wrap{
display:flex;
gap:24px;
align-items:stretch;
flex-wrap:wrap;
}
.wuxing-legend{flex:1;min-width:180px;}
.wuxing-legend h4{
font-size:0.82rem;
color:#8B6914;
font-weight:700;
margin-bottom:8px;
margin-top:12px;
}
.wuxing-legend h4:first-child{margin-top:0;}
.legend-item{
font-size:0.78rem;
color:#666;
margin-bottom:5px;
display:flex;
align-items:center;
gap:7px;
}
.legend-dot{
width:9px;height:9px;
border-radius:50%;
flex-shrink:0;
}

/* 四柱表格 */
.bazi-wrap{overflow-x:auto;}
.bazi-table{
width:100%;
border-collapse:collapse;
text-align:center;
min-width:420px;
}
.bazi-table th,.bazi-table td{
border:1px solid #F0E8DC;
padding:8px 10px;
}
.bazi-table th{
background:#FAF6F1;
font-size:0.8rem;
font-weight:700;
color:#8B6914;
}
.col-label{
background:#FAF6F1!important;
font-size:0.78rem;
font-weight:700;
color:#8B6914;
width:52px;
}
.rizhu-bg{background:#FFF8F0!important;}
.tg-char{
font-size:2rem;
font-weight:700;
line-height:1.1;
display:block;
}
.dz-char{
font-size:2rem;
font-weight:700;
line-height:1.1;
display:block;
}
.wx-label{
font-size:0.7rem;
color:#aaa;
display:block;
margin-top:2px;
}
.canggan-cell{font-size:0.78rem;color:#888;letter-spacing:3px;}
.star-cell{font-size:0.75rem;color:#888;line-height:1.8;}
.qiyun-row{font-size:0.85rem;color:#8B6914;font-weight:600;text-align:center;padding:10px!important;}

/* 歲／大運獨立表格 */
.dayun-row-wrap{
overflow-x:auto;
margin-top:10px;
}
.dayun-row-table{
border-collapse:collapse;
text-align:center;
white-space:nowrap;
width:100%;
}
.dayun-row-table td{
border:1px solid #F0E8DC;
padding:8px 14px;
font-size:0.85rem;
vertical-align:middle;
}
.dayun-row-label{
background:#FAF6F1;
font-size:0.78rem;
font-weight:700;
color:#8B6914;
padding:8px 14px!important;
white-space:nowrap;
width:48px;
text-align:center;
}
.dayun-row-cur{
background:#F5EDE0;
font-weight:700;
}

/* 大運流年表格 */
.dayun-wrap{overflow-x:auto;}
.dayun-table{
width:100%;
border-collapse:collapse;
text-align:center;
min-width:560px;
}
.dayun-table th,.dayun-table td{
border:1px solid #F0E8DC;
padding:8px 10px;
font-size:0.82rem;
white-space:nowrap;
}
.dayun-table th{
background:#FAF6F1;
font-size:0.75rem;
font-weight:700;
color:#8B6914;
}
.row-label-cell{
background:#FAF6F1;
font-size:0.75rem;
font-weight:700;
color:#8B6914;
white-space:nowrap;
padding:8px 12px!important;
}
.hl-col{background:#FFF3E0!important;font-weight:700;}
.gz-big{font-size:1.1rem;font-weight:700;}

/* 分析報告 Tab */
.tab-bar{
display:flex;
border-bottom:2px solid #F0E8DC;
margin-bottom:20px;
}
.tab-btn{
flex:1;
padding:12px;
background:none;
border:none;
font-family:inherit;
font-size:0.9rem;
color:#B89C7D;
cursor:pointer;
border-bottom:3px solid transparent;
margin-bottom:-2px;
transition:all 0.2s;
}
.tab-btn.active{
color:#8B6914;
font-weight:700;
border-bottom-color:#D4B896;
}

/* ══ 報告區塊 ══ */
.report-block{
border-left:3px solid #D4B896;
padding:16px 20px;
margin-bottom:20px;
background:#FFFCF8;
border-radius:0 10px 10px 0;
}
.report-block h4{
font-size:0.95rem;
font-weight:700;
color:#8B6914;
margin-bottom:10px;
}
.report-block p{
font-size:0.88rem;
line-height:1.9;
color:#5A4030;
}

/* ══ 知識庫卡片（新增） ══ */
.kb-card{
background:#FFFCF8;
border:1px solid #F0E8DC;
border-radius:12px;
padding:16px 20px;
margin-bottom:16px;
}
.kb-card-title{
font-size:0.9rem;
font-weight:700;
color:#8B6914;
margin-bottom:10px;
display:flex;
align-items:center;
gap:8px;
}
.kb-card-title .kb-id{
font-size:0.7rem;
background:#F0E8DC;
color:#8B6914;
padding:2px 8px;
border-radius:20px;
font-weight:600;
}
.kb-content{
font-size:0.85rem;
line-height:1.9;
color:#5A4030;
}
.kb-content ul{
padding-left:18px;
margin-top:6px;
}
.kb-content ul li{
margin-bottom:4px;
}
.kb-talk-details{
margin-top:12px;
}
.kb-talk-details p{
margin:8px 0 0;
line-height:1.9;
}
.report-summary{
font-size:0.95rem;
line-height:1.9;
color:#4A3728;
font-weight:600;
}
.report-summary p{
margin:0;
}
.report-summary p + p{
margin-top:6px;
}
.report-detail{
margin-top:8px;
padding:8px 10px;
background:#FFFDF8;
border-left:3px solid #ECD9BF;
border-radius:6px;
}
.report-detail p{
margin:0;
line-height:1.85;
}
.report-detail p + p{
margin-top:6px;
}
.key-token{
color:#8B6914;
font-weight:800;
background:#FFF7E6;
padding:0 3px;
border-radius:4px;
}
.key-strength{
color:#B45309;
font-weight:800;
}
.key-wealth{
color:#B45309;
font-weight:800;
}
.key-career{
color:#2563EB;
font-weight:800;
}
.key-love{
color:#BE185D;
font-weight:800;
}
.key-health{
color:#15803D;
font-weight:800;
}
.detail-label{
color:#7C2D12;
font-weight:800;
}
.teacher-view{
background:#FDF8EF;
border-left:3px solid #D4B896;
padding:10px 12px;
margin-top:10px;
border-radius:6px;
}
.teacher-view-title{
font-size:0.78rem;
font-weight:700;
color:#8B6914;
margin-bottom:6px;
}
.teacher-view p{
margin:5px 0 0;
font-size:0.82rem;
line-height:1.75;
}
.teacher-source{
margin-top:8px;
}
.teacher-source strong{
display:block;
font-size:0.82rem;
margin-bottom:4px;
}
.action-list{
margin:8px 0 0;
padding-left:18px;
}
.action-list li{
margin:3px 0;
line-height:1.65;
}
.summary-panel{
background:#FFFDF8;
border:1px solid #F0E2CF;
border-radius:8px;
padding:12px 14px;
margin-top:10px;
}
.summary-panel-title{
font-size:0.86rem;
font-weight:700;
color:#8B6914;
margin-bottom:6px;
}
.focus-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:8px;
margin-top:10px;
}
.focus-item{
background:#FDF8EF;
border-left:3px solid #D4B896;
border-radius:6px;
padding:8px 10px;
line-height:1.65;
}
.focus-label{
display:block;
font-size:0.76rem;
font-weight:700;
color:#8B6914;
}
.focus-value{
font-weight:800;
color:#9A3412;
}
.tone-wealth{color:#B45309;font-weight:800;}
.tone-career{color:#2563EB;font-weight:800;}
.tone-love{color:#BE185D;font-weight:800;}
.tone-health{color:#15803D;font-weight:800;}
.tone-warn{color:#B91C1C;font-weight:800;}
.kb-tag{
display:inline-block;
font-size:0.68rem;
background:#FDF5EA;
color:#B89C7D;
border:1px solid #E8DDD0;
padding:2px 8px;
border-radius:20px;
margin:4px 3px 0 0;
}

/* ══ 雙師比對（新增） ══ */
.compare-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}
.compare-box{
background:#fff;
border:1px solid #F0E8DC;
border-radius:10px;
padding:12px 14px;
}
.compare-box-title{
font-size:0.75rem;
font-weight:700;
color:#8B6914;
margin-bottom:6px;
padding-bottom:6px;
border-bottom:1px solid #F0E8DC;
}
.compare-box p{
font-size:0.78rem;
line-height:1.7;
color:#5A4030;
}
.consensus-box{
background:linear-gradient(135deg,#FDF5EA,#FAF6F1);
border:1px solid #E8DDD0;
border-radius:10px;
padding:12px 16px;
margin-top:10px;
font-size:0.82rem;
color:#8B6914;
line-height:1.7;
}
.consensus-box strong{
display:block;
margin-bottom:4px;
}

/* ══ 區塊折疊（新增） ══ */
details.kb-section{
margin-bottom:16px;
}
details.kb-section summary{
cursor:pointer;
list-style:none;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 18px;
background:#FAF6F1;
border-radius:10px;
font-size:0.92rem;
font-weight:700;
color:#8B6914;
border:1px solid #F0E8DC;
transition:background 0.2s;
}
details.kb-section summary:hover{background:#F5EDE0;}
details.kb-section summary::after{
content:'▼';
font-size:0.7rem;
color:#B89C7D;
transition:transform 0.2s;
}
details.kb-section[open] summary::after{
transform:rotate(180deg);
}
details.kb-section .section-body{
padding:16px 4px 4px;
}

/* ══ 流日日曆（新增） ══ */
.liuri-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:12px;
}
.liuri-card{
background:#fff;
border:1px solid #F0E8DC;
border-radius:10px;
padding:12px;
text-align:center;
}
.liuri-card-icon{font-size:1.4rem;margin-bottom:4px;}
.liuri-card-title{
font-size:0.72rem;
font-weight:700;
color:#8B6914;
margin-bottom:6px;
}
.liuri-card-days{
font-size:0.78rem;
color:#5A4030;
line-height:1.8;
}

/* ══ 警示框（新增） ══ */
.alert-box{
background:#FFF8F0;
border:1px solid #F0D0A0;
border-left:4px solid #E8A020;
border-radius:0 10px 10px 0;
padding:12px 16px;
margin-bottom:12px;
font-size:0.84rem;
color:#7A5020;
line-height:1.7;
}
.alert-box strong{color:#C8620A;}

/* ══ 知識庫載入狀態 ══ */
.kb-loading{
text-align:center;
padding:40px;
color:#B89C7D;
font-size:0.9rem;
}
.kb-error{
text-align:center;
padding:20px;
color:#C0392B;
font-size:0.85rem;
background:#FFEBEE;
border-radius:10px;
}

.doris-quote{
background:linear-gradient(135deg,#FDF5EA,#FAF6F1);
border:1px solid #E8DDD0;
border-radius:12px;
padding:20px 24px;
text-align:center;
margin-top:20px;
}
.doris-quote p{
font-size:0.88rem;
line-height:2;
color:#8B6914;
font-style:italic;
}

/* 區塊標題 */
.section-title{
display:flex;
align-items:center;
gap:8px;
font-size:1rem;
font-weight:700;
color:#8B6914;
margin-bottom:16px;
padding-bottom:8px;
border-bottom:2px solid #F0E8DC;
}
.section-title::before{
content:'';
display:block;
width:4px;height:18px;
background:#D4B896;
border-radius:2px;
}

/* RWD */
@media(max-width:600px){
.wuxing-wrap{flex-direction:column;}
.date-row{flex-wrap:wrap;}
.compare-wrap{grid-template-columns:1fr;}
.liuri-grid{grid-template-columns:repeat(2,1fr);}
}

/* 列印 */
@media print{
.no-print{display:none!important;}
body{background:#fff;}
.card{box-shadow:none;border:1px solid #eee;}
.container{padding:0;}
.site-header{border-bottom:2px solid #D4B896;}
details.kb-section{display:block;}
details.kb-section summary::after{display:none;}
}

.wx-small{font-size:0.65rem;color:#aaa;margin-left:3px;vertical-align:middle;}
.ms-label{font-size:0.8rem;color:#7a6652;white-space:pre-line;text-align:center;display:block;}
.fs-item{display:inline-block;font-size:0.7rem;color:#666;margin:0 2px;}
.canggan-cell span{font-size:0.85rem;}
</style>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay hidden">
<div class="loading-spinner"></div>
<p id="loading-msg">命盤推算中⋯</p>
</div>

<div class="container">

<!-- Header -->
<div class="site-header no-print">
<h1>源澄潤設計事務所</h1>
<p>Doris 的八字路口相談室</p>
</div>

<!-- 畫面一：客戶列表 -->
<div id="screen-list">
<div class="list-topbar">
<h2>客戶列表</h2>
<button class="btn btn-primary" onclick="showScreen('screen-add')">＋ 新增客戶</button>
</div>
<div id="client-list-container"></div>
</div>

<!-- 畫面二：新增客戶 -->
<div id="screen-add" class="hidden">
<div class="page-topbar no-print">
<button class="btn btn-ghost" onclick="showScreen('screen-list')">← 返回</button>
<h2>新增客戶</h2>
</div>
<div class="card">
<div class="form-group">
<label>姓名</label>
<input type="text" id="inp-name" placeholder="請輸入姓名">
</div>
<div class="form-group">
<label>性別</label>
<div class="toggle-group">
  <div class="toggle-btn active" data-group="gender" data-val="1" onclick="selectToggle(this)">男</div>
  <div class="toggle-btn" data-group="gender" data-val="0" onclick="selectToggle(this)">女</div>
</div>
</div>
<div class="form-group">
<label>出生日期</label>
<div class="date-row">
  <input type="number" id="inp-year" placeholder="西元年" min="1900" max="2099" style="flex:2">
  <select id="inp-month" style="flex:1"></select>
  <select id="inp-day" style="flex:1"></select>
</div>
<div class="lunar-hint" id="lunar-hint"></div>
</div>
<div class="form-group">
<label>出生時辰</label>
<div class="time-row">

<script>
// ══════════════════════════════════════════════
// 常數
// ══════════════════════════════════════════════
const CURRENT_YEAR = new Date().getFullYear();
const LS_KEY = 'doris_clients';
const GITHUB_RAW = 'https://raw.githubusercontent.com/aichi0121/mingli-paipan/main/data/';

const WX_MAP = {
甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',
己:'土',庚:'金',辛:'金',壬:'水',癸:'水',
子:'水',丑:'土',寅:'木',卯:'木',辰:'土',
巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'
};
const WX_COLOR = {木:'#4CAF50',火:'#E53935',土:'#FB8C00',金:'#B8860B',水:'#1E88E5'};

const SIMP_TO_TRAD = {
'劫财':'劫財','伤官':'傷官','正财':'正財',
'偏财':'偏財','七杀':'七殺','枭神':'梟神'
};
function toTrad(s){
if(!s) return s;
return s.replace(/劫财|伤官|正财|偏财|七杀|枭神/g, m=>SIMP_TO_TRAD[m]||m);
}

// ══════════════════════════════════════════════
// 知識庫快取 & 載入
// ══════════════════════════════════════════════
const KB_CACHE = {};

async function fetchKB(fileName){
if(KB_CACHE[fileName]) return KB_CACHE[fileName];
try{
const res = await fetch(GITHUB_RAW + fileName);
const json = await res.json();
KB_CACHE[fileName] = json;
return json;
}catch(e){
console.error('KB fetch error:', fileName, e);
return null;
}
}

function getEntry(kb, id){
if(!kb) return null;
const arr = kb.entries || kb.comparison_entries || [];
return arr.find(e=>e.id===id) || null;
}

function getByCategory(kb, cat){
if(!kb) return [];
const arr = kb.entries || kb.comparison_entries || [];
return arr.filter(e=>e.category===cat || e.sub_category===cat);
}

// ══════════════════════════════════════════════
// 新知識庫橋接查詢函式
// ══════════════════════════════════════════════

// 依 sub_item + query_key 精確查詢
function queryKB(kb, sub_item, query_key) {
if (!kb || !kb.knowledge_base) return null;
return kb.knowledge_base.find(entry => {
  if (entry.sub_item !== sub_item) return false;
  return Object.entries(query_key).every(([k, v]) => {
    return entry.query_key && entry.query_key[k] === v;
  });
}) || null;
}

// 取 content 文字（自動處理空值）
function qContent(kb, sub_item, query_key, fallback) {
const entry = queryKB(kb, sub_item, query_key);
return (entry && entry.content) ? entry.content : (fallback || '');
}

// 依 section 取得所有項目
function queryKBSection(kb, section) {
if (!kb || !kb.knowledge_base) return [];
return kb.knowledge_base.filter(e => e.section === section);
}

// ══════════════════════════════════════════════
// 24節氣
// ══════════════════════════════════════════════
const JIEQI_LIST = [
{name:'小寒',month:1,day:6},{name:'大寒',month:1,day:20},
{name:'立春',month:2,day:4},{name:'雨水',month:2,day:19},
{name:'驚蟄',month:3,day:6},{name:'春分',month:3,day:21},
{name:'清明',month:4,day:5},{name:'穀雨',month:4,day:20},
{name:'立夏',month:5,day:6},{name:'小滿',month:5,day:21},
{name:'芒種',month:6,day:6},{name:'夏至',month:6,day:21},
{name:'小暑',month:7,day:7},{name:'大暑',month:7,day:23},
{name:'立秋',month:8,day:7},{name:'處暑',month:8,day:23},
{name:'白露',month:9,day:8},{name:'秋分',month:9,day:23},
{name:'寒露',month:10,day:8},{name:'霜降',month:10,day:23},
{name:'立冬',month:11,day:7},{name:'小雪',month:11,day:22},
{name:'大雪',month:12,day:7},{name:'冬至',month:12,day:22},
];

function calcJieQi(year,month,day){
const all=[];
for(let y=year-1;y<=year+1;y++){
JIEQI_LIST.forEach(jq=>{all.push({name:jq.name,date:new Date(y,jq.month-1,jq.day)});});
}
all.sort((a,b)=>a.date-b.date);
const birth=new Date(year,month-1,day);
let qian=null,hou=null;
for(let i=all.length-1;i>=0;i--){if(all[i].date<birth){qian=all[i];break;}}
for(let i=0;i<all.length;i++){if(all[i].date>=birth){hou=all[i];break;}}
const fmt=d=>`${d.getMonth()+1}月${d.getDate()}日`;
return{
qian:qian?`${qian.name}（${fmt(qian.date)}）`:'—',
hou:hou?`${hou.name}（${fmt(hou.date)}）`:'—'
};
}

function updateLunarHint(){

const m=parseInt(document.getElementById('inp-month').value);

try{

const lunar=solar.getLunar();
hint.textContent=`對應農曆：${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月 ${lunar.getDayInChinese()}`;
}catch(e){hint.textContent='';}
}

// ══════════════════════════════════════════════
// 產生報告
// ══════════════════════════════════════════════
async function doGenerate(){
const name=document.getElementById('inp-name').value.trim();
const year=document.getElementById('inp-year').value;
const month=document.getElementById('inp-month').value;
const day=document.getElementById('inp-day').value;
const hour=document.getElementById('inp-hour').value;
const minute=document.getElementById('inp-min').value;
const gender=getToggleVal('gender');
if(!name||!year||!month||!day||hour===''||minute===''||gender===null){
alert('請完整填寫所有欄位');return;
}
const mm=String(month).padStart(2,'0');
const dd=String(day).padStart(2,'0');
const hh=String(hour).padStart(2,'0');
const min=String(minute).padStart(2,'0');
const dt=`${year}-${mm}-${dd}T${hh}:${min}:00+08:00`;
const payload={dateType:'solar',solarDatetime:dt,gender:parseInt(gender),eightCharProviderSect:2};
const apiUrls=[
'https://bazi.jianbao.org/api/bazi',
'https://corsproxy.io/?url='+encodeURIComponent('https://bazi.jianbao.org/api/bazi'),
'https://api.allorigins.win/raw?url='+encodeURIComponent('https://bazi.jianbao.org/api/bazi')
];
setLoading(true,'命盤推算中⋯');
let json=null,lastErr='';
for(const url of apiUrls){
try{
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const text=await res.text();
  json=JSON.parse(text);
  if(json.success) break;
}catch(e){lastErr=e.message;continue;}
}
setLoading(false);
if(!json||!json.success){alert('命盤推算暫時無法連線，請稍後再試\n'+lastErr);return;}
const client={
id:Date.now().toString(),
name,year:parseInt(year),month:parseInt(month),day:parseInt(day),
hour:parseInt(hour),minute:parseInt(minute),
gender:gender==='1'?'男':'女',
consultDate:new Date().toISOString().split('T')[0],
baziData:json.data
};
const clients=getClients();
clients.unshift(client);
saveClients(clients);
loadReport(client.id);
}

function setLoading(show,msg=''){
document.getElementById('loading-overlay').classList.toggle('hidden',!show);
if(msg) document.getElementById('loading-msg').textContent=msg;
}

// ══════════════════════════════════════════════
// 載入並渲染報告
// ══════════════════════════════════════════════
function loadReport(id){
const client=getClients().find(c=>c.id===id);
if(!client) return;
renderReport(client);
showScreen('screen-report');
}

// ══════════════════════════════════════════════
// 渲染報告主函式
// ══════════════════════════════════════════════
function renderReport(client){
const bazi=client.baziData;
const nian=bazi['年柱']||{};
const yue=bazi['月柱']||{};
const ri=bazi['日柱']||{};
const shi=bazi['时柱']||{};
const lunar=bazi['农历']||'';
const shengxiao=bazi['生肖']||'';
const riTg=(ri['天干']?.['天干'])||ri['天干']||'';
const riZhuWx=WX_MAP[riTg]||'';
const wxColor=WX_COLOR[riZhuWx]||'#999';
const jq=calcJieQi(parseInt(client.year),parseInt(client.month),parseInt(client.day));

document.getElementById('info-table').innerHTML=`
<tr>
  <td class="label">姓名</td><td class="value">${client.name}</td>
  <td class="label">性別</td><td class="value">${client.gender}</td>
</tr>
<tr>
  <td class="label">陽曆</td>
  <td class="value">${client.year}年 ${client.month}月 ${client.day}日　${String(client.hour).padStart(2,'0')}時</td>
  <td class="label">農曆</td><td class="value">${formatLunar(lunar)}</td>
</tr>
<tr>
  <td class="label">生肖</td><td class="value">${shengxiao}</td>
  <td class="label">五行</td>
  <td class="value"><span style="color:${wxColor};font-weight:700">${riZhuWx}</span></td>
</tr>
<tr>
  <td class="label">前節氣</td><td class="value">${jq.qian}</td>
  <td class="label">後節氣</td><td class="value">${jq.hou}</td>
</tr>
<tr>
  <td class="label">起運日</td>
  <td class="value" colspan="3">${bazi['大运']?.['起运日期']||'—'}（${bazi['大运']?.['起运年龄']||''}歲起運）</td>
</tr>
`;

const cols=[{key:'nian',data:nian},{key:'yue',data:yue},{key:'ri',data:ri},{key:'shi',data:shi}];
cols.forEach(({key,data})=>{
const tgObj=data['天干']||{};
const dzObj=data['地支']||{};
const tg=tgObj['天干']||'';
const dz=dzObj['地支']||'';
const tgWx=tgObj['五行']||WX_MAP[tg]||'';
const dzWx=dzObj['五行']||WX_MAP[dz]||'';
const tgC=WX_COLOR[tgWx]||'#4A3728';
const dzC=WX_COLOR[dzWx]||'#4A3728';
const cgRaw=dzObj['藏干']||{};
const cgKeys=['余气','中气','主气'];
document.getElementById('tg-'+key).innerHTML=`<span class="tg-char" style="color:${tgC}">${tg}</span><span class="wx-label">${tgWx}</span>`;
document.getElementById('dz-'+key).innerHTML=`<span class="dz-char" style="color:${dzC}">${dz}</span><span class="wx-label">${dzWx}</span>`;
const cgEl=document.getElementById('cg-'+key);
if(cgEl) cgEl.innerHTML=cgKeys.map(k=>{
  const char=cgRaw[k]?.['天干']||'';
  const wx=cgRaw[k]?.['五行']||WX_MAP[char]||'';
  const col=WX_COLOR[wx]||'#555';
  return char?`<span style="color:${col}">${char}</span>`:'';
}).filter(Boolean).join(' ');
const msEl=document.getElementById('ms-'+key);
if(msEl) msEl.innerHTML=toTrad(tgObj['十神']||'—');
const fsEl=document.getElementById('fs-'+key);
if(fsEl) fsEl.innerHTML=cgKeys.map(k=>cgRaw[k]?.['十神']||'').filter(Boolean).map(s=>`<span class="fs-item">${toTrad(s)}</span>`).join('')||'—';
});

const qiyun=bazi['大运']?.['起运日期']?'起運：'+bazi['大运']['起运日期']+'（'+bazi['大运']['起运年龄']+'歲起運）':'—';
document.getElementById('qiyun-cell').textContent=qiyun;

renderDayun(bazi);
renderAnalysisAsync(client, bazi);
}

// ══════════════════════════════════════════════
// 大運流年
// ══════════════════════════════════════════════
function renderDayun(bazi){
const dayunList=bazi['大运']?.['大运']||[];
const table=document.getElementById('dayun-table');
if(!dayunList.length){
table.innerHTML='<tr><td style="padding:20px;color:#999;text-align:center">大運資料無法載入</td></tr>';
return;
}
const ageRow=['<td class="row-label-cell">歲數</td>'];
const yearRow=['<td class="row-label-cell">年份</td>'];
const gzRow=['<td class="row-label-cell">大運</td>'];
const shenRow=['<td class="row-label-cell">十神</td>'];
dayunList.forEach(dy=>{
const startYear=dy['开始年份']||'';

function getShishen(riTg, targetTg){
const WX={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const YANG=['甲','丙','戊','庚','壬'];
const riWx=WX[riTg]; const tWx=WX[targetTg];
const riYang=YANG.includes(riTg); const tYang=YANG.includes(targetTg);
const same=riYang===tYang;
const sheng={木:'火',火:'土',土:'金',金:'水',水:'木'};
const ke={木:'土',火:'金',土:'水',金:'木',水:'火'};
if(riWx===tWx) return same?'比肩':'劫財';
if(sheng[riWx]===tWx) return same?'食神':'傷官';
if(ke[riWx]===tWx) return same?'偏財':'正財';
if(ke[tWx]===riWx) return same?'七殺':'正官';
if(sheng[tWx]===riWx) return same?'偏印':'正印';
return '—';
}

function getCaiStar(riWx){
return {木:'土',火:'金',土:'水',金:'木',水:'火'}[riWx]||'';

function getGuanStar(riWx){
return {木:'金',火:'水',土:'木',金:'火',水:'土'}[riWx]||'';
}

function getPeiouStar(riWx, gender){
return gender==='男' ? getCaiStar(riWx) : getGuanStar(riWx);

function getWeakWx(riWx, isStrong){

return {木:'土',火:'金',土:'水',金:'木',水:'火'}[riWx]||'';

function getRelation(riWx, targetWx){
if(!riWx||!targetWx) return '關係待分析';

const sheng={木:'火',火:'土',土:'金',金:'水',水:'木'};

}

    ['子','丑','土'],['寅','亥','木'],['卯','戌','火'],['辰','酉','金'],['巳','申','水'],['午','未','土']
  ];
  const clashes = [
    ['子','午'],['丑','未'],['寅','申'],['卯','酉'],['辰','戌'],['巳','亥']
  ];
  const rows = [];
  for(const [a,b,wx] of stemCombos){
    const pa = stems.find(p => p.tg === a);
    const pb = stems.find(p => p.tg === b);
    if(pa && pb){
      const supportReasons = [];
      if(yueDzWx === wx) supportReasons.push(`月支【${yueDz}】屬${wx}，月令有支撐`);
      const sameWxStems = stems.filter(p => WX_MAP[p.tg] === wx).map(p => `${p.label}【${p.tg}】`);
      if(sameWxStems.length) supportReasons.push(`${sameWxStems.join('、')}透出${wx}氣`);
      const sameWxBranches = branches.filter(p => WX_MAP[p.dz] === wx).map(p => `${p.label}【${p.dz}】`);
      if(sameWxBranches.length) supportReasons.push(`${sameWxBranches.join('、')}帶${wx}氣`);
      const comboKey = a + b;

        : `盤面缺少明顯${wx}氣支援，所以先以「有合象、有牽動」解讀，不直接斷成化${wx}。`;
      rows.push(`天干合：${pa.label}【${a}】與${pb.label}【${b}】形成「${a}${b}合${wx}・${stemComboNames[comboKey] || '天干五合'}」。${stemComboNotes[comboKey] || ''}這代表${pa.role}和${pb.role}容易互相牽動。${supportText}`);
    }
  }
  for(const [a,b,wx] of branchSix){
    const pa = branches.find(p => p.dz === a);
    const pb = branches.find(p => p.dz === b);
    if(pa && pb) rows.push(`地支六合：${pa.label}【${a}】與${pb.label}【${b}】形成「${a}${b}合${wx}」，表示相關宮位有黏著、合作或牽制關係。`);
  }
  for(const [a,b] of clashes){
    const pa = branches.find(p => p.dz === a);
    const pb = branches.find(p => p.dz === b);
    if(pa && pb) rows.push(`地支沖：${pa.label}【${a}】與${pb.label}【${b}】形成「${a}${b}沖」，相關宮位較容易出現變動、拉扯或需要調整的事件。`);
  }
  return rows;
}

function normalizeQueryKey(query_key){
  const variants = [query_key || {}];
  if(query_key?.element) variants.push({...query_key, variant: query_key.element});
  if(query_key?.variant) variants.push({...query_key, element: query_key.variant});
  return variants.map(key => Object.fromEntries(Object.entries(key).filter(([,v]) => v !== undefined && v !== '')));
}

function queryKnowledge(kb, subItems, query_keys = [{}], limit = 1){
  if(!kb || !kb.knowledge_base) return [];
  const names = Array.isArray(subItems) ? subItems : [subItems];
  const keys = (Array.isArray(query_keys) ? query_keys : [query_keys]).flatMap(normalizeQueryKey);
  const matches = [];
  for(const entry of kb.knowledge_base){
    if(!names.includes(entry.sub_item)) continue;
    const ok = keys.some(key => Object.entries(key).every(([k,v]) => entry.query_key && entry.query_key[k] === v));
    if(ok && entry.content && !matches.some(item => item.content === entry.content)) matches.push(entry);
    if(matches.length >= limit) break;
  }
  return matches;
}

function qSmart(kb, subItems, query_keys, fallback = ''){
  return personalizeContent(queryKnowledge(kb, subItems, query_keys, 1)[0]?.content || fallback);
}

function qSmartMany(kb, specs, limit = 6){
  const rows = [];
  for(const spec of specs){
    const entries = queryKnowledge(kb, spec.subItems, spec.query_keys || [{}], spec.limit || 1);
    for(const entry of entries){
      const content = personalizeContent(entry.content);
      if(content && !rows.includes(content)) rows.push(content);
      if(rows.length >= limit) return rows;
    }
  }
  return rows;
}

}

function cleanTeacherPoint(text){
  if(!text) return '';
  return text
    .replace(/^[^：:]+[：:]/,'')
    .replace(/^你的?/, '')
    .trim();
}

function escapeHtml(text){
  return String(text || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function compactTeacherText(text, maxLen = 150){
  const cleaned = personalizeContent(text || '')
    .replace(/^依據[^：:]{1,30}[：:]/, '')
    .replace(/延伸推算[：:]/g, '')
    .replace(/延伸整理[：:]/g, '')
    .replace(/；/g, '； ');
  return cleaned.length > maxLen ? cleaned.slice(0, maxLen) + '…' : cleaned;
}

function teacherName(view){
  if(view.source_code === 'B_FS' || view.teacher === '課程B') return '其他風水課程';
  return view.teacher || '老師';
}

function teacherRelevantPoints(view, query_key = {}, maxPoints = 3){
  const values = Object.values(query_key).filter(v => v !== undefined && v !== '').map(String);
  const rawPoints = Array.isArray(view.key_points) && view.key_points.length
    ? view.key_points
    : [view.interpretation || ''];
  let points = rawPoints
    .map(point => compactTeacherText(point, 120))
    .filter(Boolean)
    .filter(point => !point.includes('{{'))
    .filter(point => !point.includes('天干五合'));
  if(values.length){
    const matched = points.filter(point => values.some(v => point.includes(v)));
    if(matched.length) points = matched;
    else return [];
  }
  const seen = new Set();
  return points.filter(point => {
    if(seen.has(point)) return false;
    seen.add(point);
    return true;
  }).slice(0, maxPoints);
}

function teacherPoint(kb, question, query_key, needle){
  if(!kb || !Array.isArray(kb.questions)) return '';
  const q = kb.questions.find(item =>
    item.question === question &&
    Array.isArray(item.query_keys) &&
    item.query_keys.some(key =>
      Object.entries(query_key).every(([k,v]) => key.query_key && key.query_key[k] === v)
    )
  );
  if(!q || !q.teacher_interpretations) return '';
  for(const view of Object.values(q.teacher_interpretations)){
    const points = view.key_points || [];
    const matched = points.find(point => !needle || point.includes(needle));
    if(matched) return cleanTeacherPoint(matched);
  }
  return '';
}

function teacherViewBlock(kb, question, query_key = {}, limit = 2, options = {}){
  if(!kb || !Array.isArray(kb.questions)) return '';
  const q = kb.questions.find(item => {
    if(item.question !== question) return false;
    if(!Object.keys(query_key).length) return true;
    return Array.isArray(item.query_keys) && item.query_keys.some(key =>
      Object.entries(query_key).every(([k,v]) => key.query_key && key.query_key[k] === v)
    );
  });
  if(!q || !q.teacher_interpretations) return '';
  const seenText = new Set();
  const rows = Object.values(q.teacher_interpretations)
    .filter(view => view.interpretation && !view.interpretation.includes('未找到可直接或合理延伸'))
    .filter(view => options.includeOtherCourses || view.source_code !== 'B_FS')
    .map(view => {
      const points = teacherRelevantPoints(view, query_key, options.maxPoints || 3)
        .filter(point => {
          const key = point.replace(/\s+/g, '');
          if(seenText.has(key)) return false;
          seenText.add(key);
          return true;
        });
      if(!points.length) return '';
      return `<div class="teacher-source"><strong>${teacherName(view)}${view.domain ? '（'+view.domain+'）' : ''}</strong><ul class="action-list">${points.map(point => `<li>${escapeHtml(point)}</li>`).join('')}</ul></div>`;
    })
    .filter(Boolean)
    .slice(0, limit);
  if(!rows.length) return '';
  return `<div class="teacher-view"><div class="teacher-view-title">${options.title || '老師觀點依據（精選）'}</div>${rows.join('')}</div>`;
}

function teacherCombinedBlock(kb, items, options = {}){
  if(!kb || !Array.isArray(kb.questions)) return '';
  const seenText = new Set();
  const groups = new Map();
  for(const item of items){
    const q = kb.questions.find(qItem => qItem.question === item.question);
    if(!q || !q.teacher_interpretations) continue;
    for(const view of Object.values(q.teacher_interpretations)){
      if(!view.interpretation || view.interpretation.includes('未找到可直接或合理延伸')) continue;
      if(!options.includeOtherCourses && view.source_code === 'B_FS') continue;
      const points = teacherRelevantPoints(view, item.query_key || {}, item.maxPoints || 2);
      for(const point of points){
        const key = (view.source_code || view.teacher) + point.replace(/\s+/g, '');
        if(seenText.has(key)) continue;
        seenText.add(key);
        const label = `${teacherName(view)}${view.domain ? '（'+view.domain+'）' : ''}`;
        if(!groups.has(label)) groups.set(label, []);
        groups.get(label).push(point);
      }
    }
  }
  const rows = [...groups.entries()].slice(0, options.limit || 2).map(([label, points]) =>
    `<div class="teacher-source"><strong>${label}</strong><ul class="action-list">${points.slice(0, options.maxPoints || 3).map(point => `<li>${escapeHtml(point)}</li>`).join('')}</ul></div>`
  );
  if(!rows.length) return '';
  return `<div class="teacher-view"><div class="teacher-view-title">${options.title || '老師觀點依據（精選）'}</div>${rows.join('')}</div>`;
}

function actionList(text){
  if(!text) return '';
  const cleaned = personalizeContent(text);
  const colonIndex = Math.max(cleaned.indexOf('：'), cleaned.indexOf(':'));
  const prefix = colonIndex > -1 ? cleaned.slice(0, colonIndex + 1) : '';
  const body = colonIndex > -1 ? cleaned.slice(colonIndex + 1) : cleaned;
  const seen = new Set();
  const parts = body
    .split(/[、，；;]/)
    .map(s => s.trim().replace(/^對你來說，?/, '').replace(/^當你的命盤以「[^」]+」為主要能量時，?/, ''))
    .filter(Boolean)
    .filter(item => !item.includes('不用一次全部做到'))
    .filter(item => {
      const key = item.replace(/\s+/g, '');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .slice(0, 8);
  if(parts.length < 3) return cleaned;
  return `${prefix}<ul class="action-list">${parts.map(item => `<li>${item}</li>`).join('')}</ul>`;
}

function compactList(items){
  const cleaned = (items || [])
    .filter(Boolean)
    .map(item => String(item).trim())
    .filter(Boolean);
  if(!cleaned.length) return '';
  return `<ul class="action-list">${cleaned.map(item => `<li>${item}</li>`).join('')}</ul>`;
}

function focusItem(label, value, toneClass = ''){
  if(!value) return '';
  return `<div class="focus-item"><span class="focus-label">${label}</span><span class="focus-value ${toneClass}">${value}</span></div>`;

function enhanceReportText(text){
  if(!text) return '';
  let html = String(text);
  html = html.replace(/(財星|財位|招財|正財|偏財|得財|破財)/g, '<span class="key-wealth">$1</span>');
  html = html.replace(/(官殺|事業|職場|主管|責任|規則|文昌|大運)/g, '<span class="key-career">$1</span>');
  html = html.replace(/(配偶星|夫妻宮|感情|桃花|婚姻|親密關係)/g, '<span class="key-love">$1</span>');
  html = html.replace(/(健康|脾胃|腎臟|膀胱|保養|病符|五黃)/g, '<span class="key-health">$1</span>');
  html = html.replace(/(身強|身弱|喜用神|忌神|用神|日主|流年)/g, '<span class="key-strength">$1</span>');
  html = html.replace(/【([^】]+)】/g, '<span class="key-token">【$1】</span>');
  html = html.replace(/^([^：:]{2,14}[：:])/, '<span class="detail-label">$1</span>');
  return html;
}

function renderReportText(text, className = 'report-detail'){
  if(!text) return '';
  const raw = String(text).trim();
  if(!raw) return '';
  if(raw.startsWith('<') || raw.includes('<ul') || raw.includes('<div')) return raw;
  const sentences = raw
    .split(/(?<=。)/)
    .map(s => s.trim())
    .filter(Boolean);
  const parts = sentences.length > 1 && raw.length > 60 ? sentences : [raw];
  return `<div class="${className}">${parts.map(part => `<p>${enhanceReportText(part)}</p>`).join('')}</div>`;
}

  }).join('、');
}

// 農曆格式化（原版保留）
// ══════════════════════════════════════════════
function formatLunar(raw){
if(!raw) return '—';
let s=raw.replace('农历','').replace('農曆','').trim();
const GZ_YEAR={
甲子:1984,乙丑:1985,丙寅:1986,丁卯:1987,戊辰:1988,己巳:1989,
庚午:1990,辛未:1991,壬申:1992,癸酉:1993,甲戌:1994,乙亥:1995,
丙子:1996,丁丑:1997,戊寅:1998,己卯:1999,庚辰:2000,辛巳:2001,
壬午:2002,癸未:2003,甲申:2004,乙酉:2005,丙戌:2006,丁亥:2007,
戊子:2008,己丑:2009,庚寅:2010,辛卯:2011,壬辰:2012,癸巳:2013,
甲午:2014,乙未:2015,丙申:2016,丁酉:2017,戊戌:2018,己亥:2019,
庚子:2020,辛丑:2021,壬寅:2022,癸卯:2023,甲辰:2024,乙巳:2025,丙午:2026
};
const gzMatch=s.match(/^([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])年/);
let minguo='';
if(gzMatch){
const wy=GZ_YEAR[gzMatch[1]]||0;
minguo=wy?(wy-1911)+'年':gzMatch[1]+'年';
s=s.replace(gzMatch[0],'');
}
const CN_M={'正':1,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12};
const mMatch=s.match(/^(閏?)(正|一|二|三|四|五|六|七|八|九|十|十一|十二)月/);
let lunarMonth='';
if(mMatch){lunarMonth=(CN_M[mMatch[2]]||mMatch[2])+'月';s=s.replace(mMatch[0],'');}
const CN_D={
'初一':1,'初二':2,'初三':3,'初四':4,'初五':5,'初六':6,'初七':7,'初八':8,'初九':9,'初十':10,
'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20,
'廿一':21,'廿二':22,'廿三':23,'廿四':24,'廿五':25,'廿六':26,'廿七':27,'廿八':28,'廿九':29,'三十':30
};
let lunarDay='';
for(const[k,v]of Object.entries(CN_D)){if(s.startsWith(k)){lunarDay=v+'日';s=s.replace(k,'');break;}}
const tMatch=s.match(/([甲乙丙丁戊己庚辛壬癸]?)([子丑寅卯辰巳午未申酉戌亥])[时時]/);
const shi=tMatch?tMatch[1]+tMatch[2]+'時':'';
return[minguo,lunarMonth,lunarDay,shi].filter(Boolean).join(' ');
}
