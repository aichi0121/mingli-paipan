<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>源澄潤設計事務所｜Doris 的八字路口相談室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&subset=chinese-traditional&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
 基礎重置
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
body{
font-family:'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif;
background:#FAF6F1;
color:#4A3728;
min-height:100vh;
}
.hidden{display:none!important;}

/* ══════════════════════════════════════
 容器
══════════════════════════════════════ */
.container{
max-width:860px;
margin:0 auto;
padding:20px 16px 60px;
}

/* ══════════════════════════════════════
 Header
══════════════════════════════════════ */
.site-header{
text-align:center;
padding:28px 20px 20px;
border-bottom:1px solid #E8DDD0;
margin-bottom:24px;
}
.site-header h1{
font-size:1.3rem;
font-weight:700;
color:#8B6914;
letter-spacing:0.05em;
}
.site-header p{
font-size:0.8rem;
color:#B89C7D;
margin-top:4px;
}

/* ══════════════════════════════════════
 卡片
══════════════════════════════════════ */
.card{
background:#fff;
border-radius:16px;
box-shadow:0 2px 12px rgba(74,55,40,0.08);
padding:24px;
margin-bottom:16px;
}

/* ══════════════════════════════════════
 按鈕
══════════════════════════════════════ */
.btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:6px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-family:inherit;
font-size:0.9rem;
font-weight:600;
transition:all 0.2s;
}
.btn-primary{background:#D4B896;color:#4A3728;}
.btn-primary:hover{background:#C4A882;}
.btn-ghost{background:transparent;color:#8B6914;border:1.5px solid #D4B896;}
.btn-ghost:hover{background:#FAF6F1;}
.btn-danger{background:transparent;color:#C0392B;border:1.5px solid #E8A090;font-size:0.75rem;padding:4px 10px;}
.btn-danger:hover{background:#FFEBEE;}
.btn-full{width:100%;padding:14px;font-size:1rem;}

/* ══════════════════════════════════════
 畫面一：客戶列表
══════════════════════════════════════ */
.list-topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.list-topbar h2{font-size:1.1rem;color:#8B6914;}
.client-card{
background:#fff;
border-radius:14px;
box-shadow:0 2px 8px rgba(74,55,40,0.07);
padding:16px 20px;
margin-bottom:12px;
cursor:pointer;
transition:all 0.2s;
display:flex;
justify-content:space-between;
align-items:center;
}
.client-card:hover{box-shadow:0 4px 16px rgba(74,55,40,0.14);transform:translateY(-1px);}
.client-info h3{font-size:1.05rem;font-weight:700;margin-bottom:4px;}
.client-info p{font-size:0.8rem;color:#999;margin:0;}
.empty-state{
text-align:center;
padding:60px 20px;
color:#B89C7D;
}
.empty-state .emoji{font-size:3rem;margin-bottom:12px;}

/* ══════════════════════════════════════
 畫面二：新增客戶
══════════════════════════════════════ */
.page-topbar{
display:flex;
align-items:center;
gap:12px;
margin-bottom:24px;
}
.page-topbar h2{font-size:1.1rem;color:#8B6914;}
.form-group{margin-bottom:18px;}
.form-group label{
display:block;
font-size:0.85rem;
font-weight:600;
color:#8B6914;
margin-bottom:8px;
}
.form-group input,
.form-group select{
width:100%;
padding:11px 14px;
border:1.5px solid #E8DDD0;
border-radius:10px;
font-family:inherit;
font-size:0.95rem;
color:#4A3728;
background:#fff;
outline:none;
transition:border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus{border-color:#D4B896;}
.date-row{display:flex;gap:10px;}
.date-row select{flex:1;}
.time-row{display:flex;gap:10px;align-items:center;}
.time-row select{flex:1;}
.time-sep{font-size:1.2rem;color:#B89C7D;font-weight:700;}

/* 按鈕式單選 */
.toggle-group{display:flex;gap:8px;flex-wrap:wrap;}
.toggle-btn{
padding:9px 20px;
border:1.5px solid #E8DDD0;
border-radius:10px;
background:#fff;
color:#B89C7D;
cursor:pointer;
font-family:inherit;
font-size:0.9rem;
transition:all 0.2s;
}
.toggle-btn.active{
border-color:#D4B896;
background:#FDF5EA;
color:#8B6914;
font-weight:700;
}

/* 農曆對照提示 */
.lunar-hint{
font-size:0.78rem;
color:#B89C7D;
margin-top:6px;
min-height:18px;
}

/* Loading */
.loading-overlay{
position:fixed;inset:0;
background:rgba(250,246,241,0.92);
display:flex;flex-direction:column;
align-items:center;justify-content:center;
z-index:999;
}
.loading-spinner{
width:48px;height:48px;
border:4px solid #E8DDD0;
border-top-color:#D4B896;
border-radius:50%;
animation:spin 0.8s linear infinite;
margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay p{color:#8B6914;font-size:1rem;}

/* ══════════════════════════════════════
 畫面三：報告
══════════════════════════════════════ */
.report-topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:10px;
}

/* 基本訊息表格 */
.info-table{width:100%;border-collapse:collapse;}
.info-table td{
padding:10px 14px;
border:1px solid #F0E8DC;
font-size:0.9rem;
vertical-align:middle;
}
.info-table td.label{
background:#FAF6F1;
color:#8B6914;
font-weight:600;
width:90px;
}
.info-table td.value{
background:#fff;
}

/* 五行圖 */
.wuxing-wrap{
display:flex;
gap:24px;
align-items:stretch;
flex-wrap:wrap;
}

.wuxing-legend{flex:1;min-width:180px;}
.wuxing-legend h4{
font-size:0.82rem;
color:#8B6914;
font-weight:700;
margin-bottom:8px;
margin-top:12px;
}
.wuxing-legend h4:first-child{margin-top:0;}
.legend-item{
font-size:0.78rem;
color:#666;
margin-bottom:5px;
display:flex;
align-items:center;
gap:7px;
}
.legend-dot{
width:9px;height:9px;
border-radius:50%;
flex-shrink:0;
}

/* 四柱表格 */
.bazi-wrap{overflow-x:auto;}
.bazi-table{
width:100%;
border-collapse:collapse;
text-align:center;
min-width:420px;
}
.bazi-table th,.bazi-table td{
border:1px solid #F0E8DC;
padding:8px 10px;
}
.bazi-table th{
background:#FAF6F1;
font-size:0.8rem;
font-weight:700;
color:#8B6914;
}
.col-label{
background:#FAF6F1!important;
font-size:0.78rem;
font-weight:700;
color:#8B6914;
width:52px;
}
.rizhu-bg{background:#FFF8F0!important;}
.tg-char{
font-size:2rem;
font-weight:700;
line-height:1.1;
display:block;
}
.dz-char{
font-size:2rem;
font-weight:700;
line-height:1.1;
display:block;
}
.wx-label{
font-size:0.7rem;
color:#aaa;
display:block;
margin-top:2px;
}
.canggan-cell{font-size:0.78rem;color:#888;letter-spacing:3px;}
.star-cell{font-size:0.75rem;color:#888;line-height:1.8;}
.qiyun-row{font-size:0.85rem;color:#8B6914;font-weight:600;text-align:center;padding:10px!important;}

/* ══ 歲／大運獨立表格 ══ */
.dayun-row-wrap{
overflow-x:auto;
margin-top:10px;
}
.dayun-row-table{
border-collapse:collapse;
text-align:center;
white-space:nowrap;
width:100%;
}
.dayun-row-table td{
border:1px solid #F0E8DC;
padding:8px 14px;
font-size:0.85rem;
vertical-align:middle;
}
/* 標題欄：固定在最右邊 */
.dayun-row-label{
background:#FAF6F1;
font-size:0.78rem;
font-weight:700;
color:#8B6914;
padding:8px 14px!important;
white-space:nowrap;
width:48px;
text-align:center;
}
.dayun-row-cur{
background:#F5EDE0;
font-weight:700;
}

/* 大運流年表格 */
.dayun-wrap{overflow-x:auto;}
.dayun-table{
width:100%;
border-collapse:collapse;
text-align:center;
min-width:560px;
}
.dayun-table th,.dayun-table td{
border:1px solid #F0E8DC;
padding:8px 10px;
font-size:0.82rem;
white-space:nowrap;
}
.dayun-table th{
background:#FAF6F1;
font-size:0.75rem;
font-weight:700;
color:#8B6914;
}
.row-label-cell{
background:#FAF6F1;
font-size:0.75rem;
font-weight:700;
color:#8B6914;
white-space:nowrap;
padding:8px 12px!important;
}
.hl-col{background:#FFF3E0!important;font-weight:700;}
.gz-big{font-size:1.1rem;font-weight:700;}
.spacer-row td{height:6px;background:#FAF6F1;border:none!important;}

/* 分析報告 Tab */
.tab-bar{
display:flex;
border-bottom:2px solid #F0E8DC;
margin-bottom:20px;
}
.tab-btn{
flex:1;
padding:12px;
background:none;
border:none;
font-family:inherit;
font-size:0.9rem;
color:#B89C7D;
cursor:pointer;
border-bottom:3px solid transparent;
margin-bottom:-2px;
transition:all 0.2s;
}
.tab-btn.active{
color:#8B6914;
font-weight:700;
border-bottom-color:#D4B896;
}

/* 報告區塊 */
.report-block{
border-left:3px solid #D4B896;
padding:16px 20px;
margin-bottom:20px;
background:#FFFCF8;
border-radius:0 10px 10px 0;
}
.report-block h4{
font-size:0.95rem;
font-weight:700;
color:#8B6914;
margin-bottom:10px;
}
.report-block p{
font-size:0.88rem;
line-height:1.9;
color:#5A4030;
}
.doris-quote{
background:linear-gradient(135deg,#FDF5EA,#FAF6F1);
border:1px solid #E8DDD0;
border-radius:12px;
padding:20px 24px;
text-align:center;
margin-top:20px;
}
.doris-quote p{
font-size:0.88rem;
line-height:2;
color:#8B6914;
font-style:italic;
}

/* 區塊標題 */
.section-title{
display:flex;
align-items:center;
gap:8px;
font-size:1rem;
font-weight:700;
color:#8B6914;
margin-bottom:16px;
padding-bottom:8px;
border-bottom:2px solid #F0E8DC;
}
.section-title::before{
content:'';
display:block;
width:4px;height:18px;
background:#D4B896;
border-radius:2px;
}

/* 底部操作列 */
.bottom-bar{
display:flex;
gap:10px;
margin-top:24px;
flex-wrap:wrap;
}
.bottom-bar .btn{flex:1;min-width:120px;}

/* ══════════════════════════════════════
 列印
══════════════════════════════════════ */
@media print{
.no-print{display:none!important;}
body{background:#fff;}
.card{box-shadow:none;border:1px solid #eee;}
.container{padding:0;}
.site-header{border-bottom:2px solid #D4B896;}
}

/* ══════════════════════════════════════
 RWD
══════════════════════════════════════ */
@media(max-width:600px){
.wuxing-wrap{flex-direction:column;}
.date-row{flex-wrap:wrap;}
.bottom-bar{flex-direction:column;}
}
.wx-small{font-size:0.65rem;color:#aaa;margin-left:3px;vertical-align:middle;}
.tg-char{font-size:2rem;font-weight:700;vertical-align:middle;}
.dz-char{font-size:2rem;font-weight:700;vertical-align:middle;}
.ms-label{font-size:0.8rem;color:#7a6652;white-space:pre-line;text-align:center;display:block;}
.fs-item{display:inline-block;font-size:0.7rem;color:#666;margin:0 2px;}
.canggan-cell span{font-size:0.85rem;}
</style>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay hidden">
<div class="loading-spinner"></div>
<p>命盤推算中⋯</p>
</div>

<div class="container">

<!-- ══ Header ══ -->
<div class="site-header no-print">
<h1>源澄潤設計事務所</h1>
<p>Doris 的八字路口相談室</p>
</div>

<!-- ══════════════════════════════════
 畫面一：客戶列表
══════════════════════════════════ -->
<div id="screen-list">
<div class="list-topbar">
<h2>客戶列表</h2>
<button class="btn btn-primary" onclick="showScreen('screen-add')">＋ 新增客戶</button>
</div>
<div id="client-list-container"></div>
</div>

<!-- ══════════════════════════════════
 畫面二：新增客戶
══════════════════════════════════ -->
<div id="screen-add" class="hidden">
<div class="page-topbar no-print">
<button class="btn btn-ghost" onclick="showScreen('screen-list')">← 返回</button>
<h2>新增客戶</h2>
</div>
<div class="card">
<div class="form-group">
<label>姓名</label>
<input type="text" id="inp-name" placeholder="請輸入姓名">
</div>
<div class="form-group">
<label>性別</label>
<div class="toggle-group">
  <div class="toggle-btn active" data-group="gender" data-val="1" onclick="selectToggle(this)">男</div>
  <div class="toggle-btn" data-group="gender" data-val="0" onclick="selectToggle(this)">女</div>
</div>
</div>
<div class="form-group">
<label>出生日期</label>
<div class="date-row">
  <input type="number" id="inp-year" placeholder="西元年" min="1900" max="2099" style="flex:2">
  <select id="inp-month" style="flex:1"></select>
  <select id="inp-day" style="flex:1"></select>
</div>
<div class="lunar-hint" id="lunar-hint"></div>
</div>
<div class="form-group">
<label>出生時辰</label>
<div class="time-row">
  <select id="inp-hour" style="flex:1"><option value="">時</option></select>
  <span class="time-sep">:</span>
  <select id="inp-min" style="flex:1"><option value="">分</option></select>
</div>
</div>
<button class="btn btn-primary btn-full" onclick="doGenerate()">開始分析</button>
</div>
</div>

<!-- ══════════════════════════════════
 畫面三：報告
══════════════════════════════════ -->
<div id="screen-report" class="hidden">

<div class="report-topbar no-print">
<button class="btn btn-ghost" onclick="showScreen('screen-list')">← 返回客戶列表</button>
<div style="display:flex;gap:8px;">
<button class="btn btn-primary" onclick="window.print()">🖨 下載 PDF</button>
</div>
</div>

<!-- 基本訊息 -->
<div class="card">
<div class="section-title">基本訊息</div>
<table class="info-table" id="info-table">
<tbody></tbody>
</table>
</div>

<!-- 五行圖 -->
<div class="card">
<div class="section-title">五行相生相剋</div>
<div class="wuxing-wrap">

<div style="flex-shrink:0; min-width:420px; display:flex; align-items:center; justify-content:center;">
<img 
  src="https://raw.githubusercontent.com/aichi0121/mingli-paipan/main/wuxing-chart.png"
  alt="五行相生相剋圖"
  style="width:420px; max-width:100%; height:auto; object-fit:contain;"
  onerror="this.style.display='none'; document.getElementById('wuxing-fallback').style.display='block';"
>
<div id="wuxing-fallback" style="display:none; width:420px; height:420px; background:#FAF6F1; border-radius:12px; color:#B89C7D; font-size:0.85rem; text-align:center; padding-top:190px;">
  圖片載入失敗
</div>
</div>


<div class="wuxing-legend">
  <h4>相生關係</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div>木→火 燃燒木材會產生火</div>
  <div class="legend-item"><div class="legend-dot" style="background:#E53935"></div>火→土 火燒成灰燼，歸於塵土</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FB8C00"></div>土→金 黃金誕生於土壤中</div>
  <div class="legend-item"><div class="legend-dot" style="background:#B8860B"></div>金→水 金屬冷卻並產生水</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1E88E5"></div>水→木 水生植物</div>
  <h4>相剋關係</h4>
  <div class="legend-item">木→土 樹木吸收土壤養分</div>
  <div class="legend-item">火→金 火加熱並熔化金屬</div>
  <div class="legend-item">土→水 土壤阻擋水</div>
  <div class="legend-item">金→木 金屬砍倒樹木</div>
  <div class="legend-item">水→火 水能滅火</div>
</div>
</div>
</div>

<!-- 基本排盤 -->
<div class="card">
<div class="section-title">基本排盤</div>
<div class="bazi-wrap">
<table class="bazi-table" id="bazi-table">
  <thead>
    <tr>
      <th id="th-shi">時柱</th>
      <th id="th-ri" class="rizhu-bg">日柱</th>
      <th id="th-yue">月柱</th>
      <th id="th-nian">年柱</th>
      <th class="col-label"></th>
    </tr>
  </thead>
  <tbody>
    <!-- 主星行 -->
    <tr>
      <td id="ms-shi"></td>
      <td class="rizhu-bg" style="font-size:0.75rem;color:#B89C7D">日主</td>
      <td id="ms-yue"></td>
      <td id="ms-nian"></td>
      <td class="col-label">主星</td>
    </tr>
    <!-- 天干行 -->
    <tr>
      <td id="tg-shi"></td>
      <td id="tg-ri" class="rizhu-bg"></td>
      <td id="tg-yue"></td>
      <td id="tg-nian"></td>
      <td class="col-label">天干</td>
    </tr>
    <!-- 地支行 -->
    <tr>
      <td id="dz-shi"></td>
      <td id="dz-ri" class="rizhu-bg"></td>
      <td id="dz-yue"></td>
      <td id="dz-nian"></td>
      <td class="col-label">地支</td>
    </tr>
    <!-- 藏干行 -->
    <tr>
      <td id="cg-shi" class="canggan-cell"></td>
      <td id="cg-ri" class="canggan-cell rizhu-bg"></td>
      <td id="cg-yue" class="canggan-cell"></td>
      <td id="cg-nian" class="canggan-cell"></td>
      <td class="col-label">藏干</td>
    </tr>
    <!-- 副星行 -->
    <tr>
      <td id="fs-shi" class="star-cell"></td>
      <td id="fs-ri" class="star-cell rizhu-bg" style="font-size:0.7rem;color:#B89C7D">—</td>
      <td id="fs-yue" class="star-cell"></td>
      <td id="fs-nian" class="star-cell"></td>
      <td class="col-label">副星</td>
    </tr>
    <!-- 起運行 -->
    <tr>
      <td colspan="4" id="qiyun-cell" class="qiyun-row"></td>
      <td class="col-label">起運</td>
    </tr>
  </tbody>
</table>
</div>

<!-- ══ 歲／大運獨立表格（仿徐玉蘭） ══ -->
<div class="dayun-row-wrap">
<table class="dayun-row-table" id="dayun-row-table"></table>
</div>

</div><!-- /card 基本排盤 -->

<!-- 大運流年 -->
<div class="card">
<div class="section-title">大運 / 流年</div>
<div class="dayun-wrap">
<table class="dayun-table" id="dayun-table"></table>
</div>
</div>

<!-- 分析報告 -->
<div class="card">
<div class="section-title">命理分析報告</div>
<div class="tab-bar no-print">
<button class="tab-btn active" onclick="switchTab('full',this)">📋 完整版</button>
<button class="tab-btn" onclick="switchTab('quick',this)">⚡ 快速版</button>
</div>
<div id="tab-full"></div>
<div id="tab-quick" class="hidden"></div>
</div>

</div><!-- /screen-report -->
</div><!-- /container -->

<script>
// ══════════════════════════════════════════════
// 常數
// ══════════════════════════════════════════════
const CURRENT_YEAR = 2026;
const LS_KEY = 'doris_clients';

const WX_MAP = {
甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',

const JIEQI_LIST = [
{ name:'小寒', month:1,  day:6  },
{ name:'大寒', month:1,  day:20 },
{ name:'立春', month:2,  day:4  },
{ name:'雨水', month:2,  day:19 },
{ name:'驚蟄', month:3,  day:6  },
{ name:'春分', month:3,  day:21 },
{ name:'清明', month:4,  day:5  },
{ name:'穀雨', month:4,  day:20 },
{ name:'立夏', month:5,  day:6  },
{ name:'小滿', month:5,  day:21 },
{ name:'芒種', month:6,  day:6  },
{ name:'夏至', month:6,  day:21 },
{ name:'小暑', month:7,  day:7  },
{ name:'大暑', month:7,  day:23 },
{ name:'立秋', month:8,  day:7  },
{ name:'處暑', month:8,  day:23 },
{ name:'白露', month:9,  day:8  },
{ name:'秋分', month:9,  day:23 },
{ name:'寒露', month:10, day:8  },
{ name:'霜降', month:10, day:23 },
{ name:'立冬', month:11, day:7  },
{ name:'小雪', month:11, day:22 },
{ name:'大雪', month:12, day:7  },
{ name:'冬至', month:12, day:22 },
];

function calcJieQi(year, month, day){
const all = [];
for(let y = year-1; y <= year+1; y++){
JIEQI_LIST.forEach(jq=>{
all.push({ name: jq.name, date: new Date(y, jq.month-1, jq.day) });
});
}
all.sort((a,b)=>a.date-b.date);
const birth = new Date(year, month-1, day);
let qian = null;
for(let i = all.length-1; i >= 0; i--){
if(all[i].date < birth){ qian = all[i]; break; }
}
let hou = null;
for(let i = 0; i < all.length; i++){
if(all[i].date >= birth){ hou = all[i]; break; }
}
const fmt = d => `${d.getMonth()+1}月${d.getDate()}日`;
return {
qian: qian ? `${qian.name}（${fmt(qian.date)}）` : '—',
hou:  hou  ? `${hou.name}（${fmt(hou.date)}）`  : '—',
};
}

// ══════════════════════════════════════════════
async function doGenerate(){
const name   = document.getElementById('inp-name').value.trim();
const year   = document.getElementById('inp-year').value;
const month  = document.getElementById('inp-month').value;
const day    = document.getElementById('inp-day').value;
const hour   = document.getElementById('inp-hour').value;
const minute = document.getElementById('inp-min').value;
const gender = getToggleVal('gender');

if(!name||!year||!month||!day||hour===''||minute===''||gender===null){
alert('請完整填寫所有欄位'); return;
}

const mm  = String(month).padStart(2,'0');
const dd  = String(day).padStart(2,'0');
const hh  = String(hour).padStart(2,'0');
const min = String(minute).padStart(2,'0');
const dt  = `${year}-${mm}-${dd}T${hh}:${min}:00+08:00`;

const payload = {
dateType:'solar',
solarDatetime:dt,
gender:parseInt(gender),
eightCharProviderSect:2
};

const apiUrls = [
'https://bazi.jianbao.org/api/bazi',
'https://corsproxy.io/?url=' + encodeURIComponent('https://bazi.jianbao.org/api/bazi'),
'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://bazi.jianbao.org/api/bazi')
];

document.getElementById('loading-overlay').classList.remove('hidden');

let json = null;
let lastErr = '';

for(const url of apiUrls){
try{
const res = await fetch(url,{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(payload)
});
const text = await res.text();
json = JSON.parse(text);
if(json.success) break;
}catch(e){
lastErr = e.message;
continue;
}
}

document.getElementById('loading-overlay').classList.add('hidden');

if(!json||!json.success){
alert('命盤推算暫時無法連線，請稍後再試\n'+lastErr);
return;
}

const client = {
id: Date.now().toString(),
name,
year:parseInt(year), month:parseInt(month), day:parseInt(day),
hour:parseInt(hour), minute:parseInt(minute),
gender: gender==='1'?'男':'女',
consultDate: new Date().toISOString().split('T')[0],
baziData: json.data
};

const clients = getClients();
clients.unshift(client);
saveClients(clients);
loadReport(client.id);
}

const DZ = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

function getGZ(y){
return { gz: TG[(y-4)%10]+DZ[(y-4)%12], tg: TG[(y-4)%10] };
}

const lyAgeRow  = ['<td class="row-label-cell">歲數</td>'];
const lyYearRow = ['<td class="row-label-cell">年份</td>'];
const lyGzRow   = ['<td class="row-label-cell">流年</td>'];

for(let y = dyStart; y <= dyEnd; y++){
const { gz, tg } = getGZ(y);
const age   = y - birthYear + 1;
const tgC   = WX_COLOR[WX_MAP[tg]] || '#4A3728';
const isCur = y === CURRENT_YEAR;
const cls   = isCur ? 'hl-col' : '';
lyAgeRow .push(`<td class="${cls}">${age}</td>`);
lyYearRow.push(`<td class="${cls}">${y}</td>`);
lyGzRow  .push(`<td class="${cls}"><span style="color:${tgC};font-weight:${isCur?'700':'400'}">${gz}</span>${isCur?'<br><span style="font-size:10px;color:#C8622A">▶今年</span>':''}</td>`);
}

const old = document.getElementById('liunian-table-wrap');
if(old) old.remove();

const wrap = table.closest('.dayun-wrap') || table.parentElement;
const lnDiv = document.createElement('div');
lnDiv.id = 'liunian-table-wrap';
lnDiv.style.cssText = 'margin-top:20px;overflow-x:auto;';
lnDiv.innerHTML = `
<div style="font-size:0.8rem;font-weight:700;color:#8B6914;margin-bottom:8px;">
當前大運（${curDy['干支']} ${curDy['天干十神']}）· 流年
</div>
<table class="dayun-table">
<tr>${lyAgeRow.join('')}</tr>
<tr>${lyYearRow.join('')}</tr>
<tr>${lyGzRow.join('')}</tr>
</table>
`;
wrap.appendChild(lnDiv);
}

// ══════════════════════════════════════════════
// 農曆格式化
// ══════════════════════════════════════════════
function formatLunar(raw){
if(!raw) return '—';
let s = raw.replace('农历','').replace('農曆','').trim();
const GZ_YEAR = {
甲子:1984,乙丑:1985,丙寅:1986,丁卯:1987,戊辰:1988,己巳:1989,
庚午:1990,辛未:1991,壬申:1992,癸酉:1993,甲戌:1994,乙亥:1995,
丙子:1996,丁丑:1997,戊寅:1998,己卯:1999,庚辰:2000,辛巳:2001,
壬午:2002,癸未:2003,甲申:2004,乙酉:2005,丙戌:2006,丁亥:2007,
戊子:2008,己丑:2009,庚寅:2010,辛卯:2011,壬辰:2012,癸巳:2013,
甲午:2014,乙未:2015,丙申:2016,丁酉:2017,戊戌:2018,己亥:2019,
庚子:2020,辛丑:2021,壬寅:2022,癸卯:2023,甲辰:2024,乙巳:2025,丙午:2026
};
const gzMatch = s.match(/^([甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥])年/);
let minguo = '';
if(gzMatch){
const wy = GZ_YEAR[gzMatch[1]]||0;
minguo = wy ? (wy-1911)+'年' : gzMatch[1]+'年';
s = s.replace(gzMatch[0],'');
}
const CN_M = {'正':1,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,
          '七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12};
const mMatch = s.match(/^(閏?)(正|一|二|三|四|五|六|七|八|九|十|十一|十二)月/);
let lunarMonth = '';
if(mMatch){ lunarMonth=(CN_M[mMatch[2]]||mMatch[2])+'月'; s=s.replace(mMatch[0],''); }
const CN_D = {
'初一':1,'初二':2,'初三':3,'初四':4,'初五':5,'初六':6,'初七':7,'初八':8,'初九':9,'初十':10,
'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20,
'廿一':21,'廿二':22,'廿三':23,'廿四':24,'廿五':25,'廿六':26,'廿七':27,'廿八':28,'廿九':29,'三十':30
};
let lunarDay = '';
for(const [k,v] of Object.entries(CN_D)){
if(s.startsWith(k)){ lunarDay=v+'日'; s=s.replace(k,''); break; }
}
const tMatch = s.match(/([甲乙丙丁戊己庚辛壬癸]?)([子丑寅卯辰巳午未申酉戌亥])[时時]/);
const shi = tMatch ? tMatch[1]+tMatch[2]+'時' : '';
return [minguo,lunarMonth,lunarDay,shi].filter(Boolean).join(' ');
}
